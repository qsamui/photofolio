{% load static %}
<!doctype html> 
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %} Portfolio {% endblock %}</title>
<link rel="icon" href="{% static 'img/portrait-placeholder.jpg' %}">
    <meta property="og:title" content="Photofolio">
    <meta property="og:description" content="Photographer's portfolio: categories, sessions, portraits">
    <meta property="og:image" content="{% static 'img/portrait-placeholder.jpg' %}">
    <meta name="theme-color" content="#0b0b0f">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head> 
<body class="home">
<header class="site-header">
    <a class="brand" href="/">Photofolio</a>
    <nav class="nav">
        <a href="/">Main</a>
    </nav>
</header>    
<main>{% block content %}{% endblock %}</main>
<footer class="site-footer">
    <p>&copy; {% now 'Y' %} Photofolio / by Django</p>
</footer>
<script src="{% static 'js/main.js' %}"></script>
<div class="lightbox" aria-hidden="true">
  <button class="lightbox-close" aria-label="Close">×</button>
  <img class="lightbox-img" alt="">
</div>
</body>
</html>
